<!DOCTYPE html>
<html>
<head>
<title>Business King</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial, sans-serif;
color:white;
background:url("https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?auto=format&fit=crop&w=1200&q=80");
background-size:cover;
background-position:center;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

/* dark overlay */
body::before{
content:"";

width:100%;
height:100%;

/* 🔥 WELCOME TEXT */
.welcome{

/* VIP BOX */
.vipbox{
background:#0a0a0a;
padding:22px 18px;
border-radius:18px;
width:82%;
max-width:300px;
box-shadow:0 0 25px rgba(255,215,0,0.25);
}

.viptitle{
font-size:20px;
color:#d4af37;
margin-bottom:6px;
letter-spacing:1px;
}

.desc{
color:#bbb;
font-size:13px;
margin-bottom:18px;
line-height:1.4;
}

.btn{
display:block;
background:#d4af37;
color:#000;
padding:12px;
border-radius:25px;
text-decoration:none;
font-weight:bold;
font-size:14px;
box-shadow:0 0 15px rgba(255,215,0,0.7);
}

.footer{
margin-top:12px;
font-size:10px;

</style>
</head>

<body>

<div class="welcome">

</html>
